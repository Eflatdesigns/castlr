# Castlr — Nginx reverse proxy configuration
# Place in /etc/nginx/sites-available/castlr and symlink to sites-enabled

# Icecast streaming proxy (stream.yourdomain.com → localhost:8000)
server {
    listen 80;
    listen [::]:80;
    server_name stream.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stream.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/stream.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stream.yourdomain.com/privkey.pem;

    # Stream endpoints (listeners)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;         # Critical: disable buffering for audio streams
        proxy_read_timeout 3600s;    # Keep connection open for long streams
        proxy_send_timeout 3600s;
        add_header Cache-Control "no-cache, no-store";
        add_header Access-Control-Allow-Origin "https://yourdomain.com";
        add_header Access-Control-Allow-Methods "GET, OPTIONS, HEAD";
    }

    # Block public access to Icecast admin panel
    location /admin {
        deny all;
    }

    # Allow status endpoint (used by the app)
    location /status-json.xsl {
        proxy_pass http://127.0.0.1:8000/status-json.xsl;
        proxy_buffering on;
        add_header Cache-Control "max-age=10";
        add_header Access-Control-Allow-Origin "https://yourdomain.com";
    }
}

# Main app proxy (yourdomain.com → Next.js on 3000)
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
